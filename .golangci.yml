version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
    # noctx is intentionally NOT enabled for the beta: golangci-lint v2's noctx
    # flags every exec/net/database call lacking a context (11 pre-existing
    # sites across the helper spawn path and the sqlite init). Threading context
    # through those is real work, tracked as a backlog item, not a beta gate.
  settings:
    gocritic:
      # Only the diagnostic tag is enforced. The style/performance opinions
      # (hugeParam, unnamedResult, …) are a pre-existing backlog, not bugs.
      enabled-tags:
        - diagnostic
    staticcheck:
      # Keep correctness (SA*) and simplification (S*) checks. Style (ST*) and
      # quickfix (QF*) suggestions are deferred with the rest of the style
      # backlog to keep the beta's enforced set stable.
      checks:
        - all
        - -ST*
        - -QF*
    revive:
      rules:
        # The exported-symbol doc-comment rule flags ~50 pre-existing gaps.
        # Tracked as a documentation backlog rather than a CI gate for the beta.
        - name: exported
          disabled: true
  exclusions:
    generated: lax
    rules:
      # Test code is not subject to the security/opinion linters: file
      # permissions, file-from-variable reads and int conversions in tests carry
      # no production risk, and unchecked errors in tests surface via t.Fatal.
      - linters:
          - errcheck
          - gocritic
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
