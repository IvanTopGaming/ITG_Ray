run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gosec
    - misspell
    - unconvert
    - gocritic
    - revive
    - bodyclose
    - noctx
    - errorlint

linters-settings:
  gocritic:
    # Only the diagnostic tag is enforced. The style/performance opinions
    # (hugeParam, unnamedResult, …) are a large pre-existing backlog tracked
    # separately; they are not correctness issues.
    enabled-tags: [diagnostic]
  revive:
    rules:
      # The exported-symbol doc-comment rule flags ~50 pre-existing gaps.
      # Tracked as a documentation backlog rather than a CI gate for the beta.
      - name: exported
        disabled: true

issues:
  exclude-use-default: false
  max-same-issues: 0
  exclude-rules:
    # Test code is not subject to the security/opinion linters: file
    # permissions, file-from-variable reads and int conversions in tests carry
    # no production risk, and unchecked errors in tests surface via t.Fatal.
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - gocritic
        - noctx
