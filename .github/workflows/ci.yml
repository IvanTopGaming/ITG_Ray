name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for every job: the CI jobs only read the checkout.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go test
        run: go test -race -count=1 -timeout 120s ./...

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: smoke e2e
        env:
          ITGRAY_E2E: "1"
        run: go test -tags e2e -race -timeout 120s ./cmd/itgray-cli/...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/itgray-electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            cmd/itgray-electron/package-lock.json
            cmd/itgray-electron/frontend/package-lock.json
      - name: install deps
        run: npm ci && npm --prefix frontend ci
      - name: typecheck main + preload
        run: npm run build:main && npm run build:preload
      - name: main-process tests
        run: node --test dist-main/main/*.test.js
      - name: frontend tests
        run: npm --prefix frontend test
      - name: frontend build
        run: npm --prefix frontend run build
